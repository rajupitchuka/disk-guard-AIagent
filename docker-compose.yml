# OpsGPT POC stack — Zone 1 + Zone 4 of the reference architecture, plus
# 3 demo "host" containers that act as live test machines with real
# filesystems the LLM agent and remediation engine operate on.
#
# Up:    docker compose up -d
# Logs:  docker compose logs -f
# Down:  docker compose down              # keeps data volumes
# Reset: docker compose down -v           # deletes volumes too

services:
  # ============================================================
  # Zone 1 — TimescaleDB for telemetry + ML predictions
  # ============================================================
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg17
    container_name: opsgpt_timescaledb
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-opsgpt_telemetry}
      POSTGRES_USER: ${TIMESCALE_USER:-opsgpt}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-opsgpt_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-opsgpt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Zone 4 — pgvector for RAG corpus
  # ============================================================
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: opsgpt_pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-opsgpt_rag}
      POSTGRES_USER: ${PGVECTOR_USER:-opsgpt}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-opsgpt_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./docker/pgvector/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-opsgpt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Zone 4 — Redis for state, dedup, agent cache
  # ============================================================
  redis:
    image: redis:7.4-alpine
    container_name: opsgpt_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # Demo test hosts — real Linux containers acting as production servers.
  # Each one self-reports disk usage and has a real filesystem the
  # LLM agent operates on during remediation.
  # ============================================================
  demo-web-01:
    build: ./docker/demo-host
    container_name: demo-web-01
    environment:
      HOST_ID: demo-web-01
      HOSTNAME: web-prod-us-east0001
      OS_TYPE: linux
      ENVIRONMENT: prod
      REGION: us-east-1
      ROLE: web
      MONITORED_PATH: /var/log
      VIRTUAL_TOTAL_GB: 50
      REPORT_INTERVAL_SEC: 60
      TIMESCALE_DSN: postgresql://opsgpt:opsgpt_dev_password@timescaledb:5432/opsgpt_telemetry
    volumes:
      - demo_web_logs:/var/log
    depends_on:
      timescaledb:
        condition: service_healthy

  demo-app-01:
    build: ./docker/demo-host
    container_name: demo-app-01
    environment:
      HOST_ID: demo-app-01
      HOSTNAME: app-prod-us-east0001
      OS_TYPE: linux
      ENVIRONMENT: prod
      REGION: us-east-1
      ROLE: app
      MONITORED_PATH: /var/log/app
      VIRTUAL_TOTAL_GB: 100
      REPORT_INTERVAL_SEC: 60
      TIMESCALE_DSN: postgresql://opsgpt:opsgpt_dev_password@timescaledb:5432/opsgpt_telemetry
    volumes:
      - demo_app_logs:/var/log/app
    depends_on:
      timescaledb:
        condition: service_healthy

  demo-db-01:
    build: ./docker/demo-host
    container_name: demo-db-01
    environment:
      HOST_ID: demo-db-01
      HOSTNAME: db-prod-us-east0001
      OS_TYPE: linux
      ENVIRONMENT: prod
      REGION: us-east-1
      ROLE: db
      MONITORED_PATH: /var/log/postgresql
      VIRTUAL_TOTAL_GB: 500
      REPORT_INTERVAL_SEC: 60
      TIMESCALE_DSN: postgresql://opsgpt:opsgpt_dev_password@timescaledb:5432/opsgpt_telemetry
    volumes:
      - demo_db_logs:/var/log/postgresql
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
  pgvector_data:
  redis_data:
  demo_web_logs:
  demo_app_logs:
  demo_db_logs:
